# Include this in the server block that serves the static site.
# Put your CDN in front of this origin, or upload these same files to the CDN.

brotli on;
brotli_comp_level 6;
brotli_static on;
brotli_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml;

gzip on;
gzip_comp_level 6;
gzip_vary on;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml;

add_header Content-Security-Policy "default-src 'self'; img-src 'self' https: data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; frame-src https://maps.google.com https://www.google.com; connect-src 'self'; base-uri 'self'; form-action 'self'" always;
add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

location = /index.html {
  add_header Cache-Control "public, max-age=0, must-revalidate" always;
}

location ~* \.(?:css|js|br|webp|png|jpe?g|gif|svg|ico|woff2?)$ {
  add_header Cache-Control "public, max-age=31536000, immutable" always;
  try_files $uri =404;
}

location / {
  try_files $uri $uri/ /index.html;
}
